<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moodboard</title>
    <style>
      html, body { width: 280px; margin: 0; padding: 0; }
      body { padding: 14px; box-sizing: border-box; }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #fff;
        font-family: 'HelveticaBold', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        color: #1a1a2e;
      }

      h1 {
        font-size: 16px;
        font-weight: bold;
        color: #ff3c00;
        margin-bottom: 14px;
      }

      button {
        display: block;
        width: 100%;
        font-family: inherit;
        font-size: 13px;
        font-weight: bold;
        color: #fff;
        border: none;
        border-radius: 0;
        padding: 10px;
        cursor: pointer;
      }

      #open-main-btn {
        background: #ff3c00;
        margin-bottom: 14px;
      }

      #open-main-btn:hover {
        background: #e03600;
      }

      .separator {
        border: none;
        border-top: 1px solid #eef0f3;
        margin: 14px 0;
      }

      label {
        display: block;
        font-size: 11px;
        color: #888;
        margin-bottom: 6px;
      }

      #board-select {
        display: block;
        width: 100%;
        font-family: inherit;
        font-size: 13px;
        padding: 8px;
        border: 1px solid #d0d0d8;
        border-radius: 0;
        background: #fff;
        color: #1a1a2e;
        margin-bottom: 12px;
        cursor: pointer;
      }

      #capture-btn {
        background: #1a1a2e;
        margin-bottom: 10px;
      }

      #capture-btn:hover {
        background: #2a2a4e;
      }

      #capture-btn.active {
        background: #ff3c00;
      }

      #capture-btn.active:hover {
        background: #e03600;
      }

      .help-text {
        font-size: 11px;
        color: #888;
        line-height: 1.5;
      }

      #figma-export-btn {
        background: #1a1a2e;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      #figma-export-btn:hover { background: #2a2a4e; }
      #figma-export-btn.loading { opacity: 0.6; pointer-events: none; }
      #figma-status {
        font-size: 11px;
        line-height: 1.5;
        min-height: 16px;
        color: #888;
      }
      #figma-status.ok  { color: #080; }
      #figma-status.err { color: #c00; }
    </style>
  </head>
  <body>
    <h1>Moodboard</h1>

    <button id="open-main-btn">Ouvrir le menu principal</button>

    <hr class="separator" />

    <label for="board-select">Board cible :</label>
    <select id="board-select"></select>

    <button id="capture-btn">Activer le mode capture</button>

    <p class="help-text">Cliquez sur les images de la page pour les ajouter au board sélectionné. Echap ou re-clic pour quitter.</p>

    <hr class="separator" />

    <button id="figma-export-btn">⬡ Exporter → Figma</button>
    <p class="help-text" id="figma-status"></p>

    <script src="popup.js"></script>
  </body>
</html>
